name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_REPO: ghcr.io/benlagrone/lecrownproperties-site

concurrency:
  group: lecrownproperties-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Site Container
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deploy contract
        run: bash scripts/verify-deploy-contract.sh

      - name: Render compose config
        run: docker compose -p lecrownproperties -f compose.yaml config >/tmp/lecrownproperties-compose.yaml

      - name: Smoke test container
        run: bash scripts/smoke-test-container.sh

  publish:
    name: Publish Image
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.publish.outputs.image_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish image
        id: publish
        run: |
          set -euo pipefail
          SHA_TAG="sha-${GITHUB_SHA}"
          docker build -t "${IMAGE_REPO}:${SHA_TAG}" -t "${IMAGE_REPO}:latest" .
          docker push "${IMAGE_REPO}:${SHA_TAG}"
          docker push "${IMAGE_REPO}:latest"
          echo "image_ref=${IMAGE_REPO}:${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        run: |
          {
            echo "## Image Publish"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Image: \`${{ steps.publish.outputs.image_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  dispatch_fortress:
    name: Dispatch Fortress Deploy
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs:
      - verify
      - publish
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://lecrownproperties.com
    env:
      FORTRESS_WORKFLOW_TOKEN: ${{ secrets.FORTRESS_WORKFLOW_TOKEN }}
      SOURCE_SHA: ${{ github.sha }}

    steps:
      - name: Validate dispatch secret
        run: test -n "$FORTRESS_WORKFLOW_TOKEN"

      - name: Dispatch fortress workflow
        run: |
          set -euo pipefail
          curl -fsS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${FORTRESS_WORKFLOW_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/benlagrone/fortress-phronesis/actions/workflows/deploy-lecrownproperties.yml/dispatches \
            -d @- <<EOF
          {
            "ref": "main",
            "inputs": {
              "source_sha": "${SOURCE_SHA}",
              "environment": "prod"
            }
          }
          EOF

      - name: Deployment summary
        run: |
          {
            echo "## Fortress Dispatch"
            echo ""
            echo "- Source SHA: \`${SOURCE_SHA}\`"
            echo "- Image: \`${{ needs.publish.outputs.image_ref }}\`"
            echo "- Fortress workflow: \`deploy-lecrownproperties.yml\`"
          } >> "$GITHUB_STEP_SUMMARY"
